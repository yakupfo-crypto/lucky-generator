<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Generator</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f2f6fb;
  padding-bottom: 100px;
}

header{
  background:#1976d2;
  color:white;
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.container{ padding:20px; }

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input{
  width:100%;
  box-sizing:border-box;
  padding:8px;
  margin:5px 0 10px 0;
}

button{
  background:#1976d2;
  color:white;
  border:none;
  padding:10px;
  width:100%;
  border-radius:6px;
  font-size:16px;
  margin-top:5px;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#1976d2;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

.bottom-nav button{
  background:none;
  color:white;
  border:none;
  width:auto;
}

.ball-row{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:10px;
}

.ball{
width:38px;
height:38px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
font-size:17px;
background:#f0f0f0;
color:#333;
border:1px solid #ddd;
}

.ball.selected.result-selected{
background:#1976d2!important;
color:white!important;
border:none;
}

.ball.joker{
background:#e8f5e9;
color:#2e7d32;
border:1px solid #c8e6c9;
}

.ball.joker.result-selected{
background:#4caf50!important;
color:white!important;
border:none;
}

.card b{
display:block;
margin-bottom:10px;
color:#1976d2;
}

.ball.result-selected{
background:#4caf50;
color:#fff;
}
</style>
</head>

<body>

<header>Lucky Generator</header>

<div class="container" id="generatePage">
<div class="card">

<label><b>Ana Grup Toplam Sayı (Havuz)</b></label>
<input type="number" id="maxNumber" value="35">

<label>Ana Grup Seçilecek Adet</label>
<input type="number" id="perSet" value="5">

<hr>

<label><b>Joker Grubu Toplam Sayı (Havuz)</b></label>
<input type="number" id="jokerMax" value="31">

<label>Joker Seçilecek Adet</label>
<input type="number" id="jokerCount" value="1">

<hr>

<label>Kolon Sayısı</label>
<input type="number" id="setCount" value="5">

<button onclick="generateSets()">Kolonları Üret</button>

</div>

<div id="results"></div>
</div>

<div class="container" id="mySetsPage" style="display:none;">
<h3>Kayıtlı Kolonlarım</h3>
<div id="savedSets"></div>
</div>

<div class="bottom-nav">
<button onclick="showGenerate()">Üret</button>
<button onclick="showMySets()">Kayıtlarım</button>
</div>

<script>

const generatePage=document.getElementById("generatePage")
const mySetsPage=document.getElementById("mySetsPage")
const results=document.getElementById("results")
const savedSets=document.getElementById("savedSets")

let generatedSets=[]
let savedGroups=JSON.parse(localStorage.getItem("savedGroups"))||[]
let groupCounter=savedGroups.length>0?Math.max(...savedGroups.map(g=>g.id))+1:1

/* SAYFA HER AÇILDIĞINDA ÜRET EKRANI */
window.onload=function(){
showGenerate()
}

function createBalls(set){
let balls="<div class='ball-row'>"

set.numbers.forEach(n=>{
balls+=`<div class="ball selected">${n}</div>`
})

set.jokers.forEach(j=>{
balls+=`<div class="ball joker">${j}</div>`
})

balls+="</div>"
return balls
}

function generateSets(){

const max=parseInt(document.getElementById("maxNumber").value)
const per=parseInt(document.getElementById("perSet").value)
const jMax=parseInt(document.getElementById("jokerMax").value)
const jPer=parseInt(document.getElementById("jokerCount").value)
const count=parseInt(document.getElementById("setCount").value)

generatedSets=[]

for(let i=0;i<count;i++){

let numbers=[]

while(numbers.length<per){
let n=Math.floor(Math.random()*max)+1
if(!numbers.includes(n)) numbers.push(n)
}

numbers.sort((a,b)=>a-b)

let jokers=[]

while(jokers.length<jPer){
let j=Math.floor(Math.random()*jMax)+1
if(!jokers.includes(j)) jokers.push(j)
}

jokers.sort((a,b)=>a-b)

generatedSets.push({numbers,jokers})

}

displayGenerated()

}

function displayGenerated(){

let html=""

generatedSets.forEach((set,i)=>{

html+=`
<div class='card'>
<b>${i+1}. Kolon</b>
${createBalls(set)}
</div>
`

})

if(generatedSets.length>0){

html+=`
<button onclick='saveGroup()'>
Kaydet
</button>
`

}

results.innerHTML=html

}

function saveGroup(){

let name=prompt("Grup adı:")
if(!name) return

savedGroups.push({
id:groupCounter++,
name:name,
sets:[...generatedSets]
})

localStorage.setItem("savedGroups",JSON.stringify(savedGroups))

alert("Kaydedildi")

}

function showGenerate(){

generatePage.style.display="block"
mySetsPage.style.display="none"

}

function showMySets(){

generatePage.style.display="none"
mySetsPage.style.display="block"

let html=""

if(savedGroups.length===0){
html="<p>Henüz kayıtlı set yok.</p>"
}

savedGroups.forEach(group=>{

html+=`
<div class='card'>
<b>${group.name}</b><br>
Kolon Sayısı: ${group.sets.length}
</div>
`

})

savedSets.innerHTML=html

}

</script>
</body>
</html>
